# wrangler.toml — Cloudflare Pages 项目配置 (任务 002-account-rate-limit T1+T2)
#
# 用途:
#   - `wrangler d1 migrations apply` 命令需要 D1 binding 配置
#   - `wrangler pages dev` local 跑 SvelteKit + Pages Functions 时载入 bindings
#   - 作为 SPEC v1.0 C5 (D1 schema) + C6 (P 规则集) 之外的 binding source of truth
#
# 注意: production 部署仍由 CF Pages dashboard 触发 (git push → auto deploy)。
# Cloudflare Pages bindings / 非密环境变量以本 wrangler.toml 为 source of truth；
# Dashboard 中会提示这些字段由 wrangler.toml 管理，改配置请提交本文件后重新部署。
# database_id / kv namespace id 在 2026-05-22 由 user 跑 wrangler create 后回填。
#
name = "guess-figure"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./.svelte-kit/cloudflare"

# ====================================================================
# 普通 env vars (非密, 入 git, SPEC C3)
# ====================================================================
# 阈值变更 = git commit, 部署后即生效 (不再走 dashboard UI)
# Stage 3 Prototype 实测云雾单次 ¥0.000526 → V=8000/天 ≈ ¥4.2/天容忍
[vars]
LLM_BUDGET_DAILY = "8000"
LLM_BUDGET_PER_USER = "50"
# RATE_LIMIT_PER_IP_DAILY: 验收后用户调整 200 → 1000 (减少共享 NAT 下误伤合法用户;
# 单 IP 真实流量 < 1000/天 已足够防机器人, LLM 成本由 LLM_BUDGET_* 兜底).
# RATE_LIMIT_PER_USER_DAILY 保持 200 (单 cookie 用户级仍按 SPEC C3 默认).
RATE_LIMIT_PER_IP_DAILY = "1000"
RATE_LIMIT_PER_USER_DAILY = "200"
# LLM 模型 / endpoint (001 已使用, 但 001 时这些在 dashboard 配; 现统一在此)
LLM_MODEL = "gemini-3.1-flash-lite"
YUNWU_BASE_URL = "https://yunwu.ai/v1"

# 004 海龟汤 RAG 资源契约 (非密配置)
# Vectorize V2 index 需用以下命令创建:
# pnpm exec wrangler vectorize create guess-figure-turtle-rag --dimensions=1024 --metric=cosine
# R2 bucket 需用以下命令创建:
# pnpm exec wrangler r2 bucket create guess-figure-turtle-corpus
RAG_EMBEDDING_MODEL = "@cf/qwen/qwen3-embedding-0.6b"
RAG_INDEX_VERSION = "turtle-rag-v1"
RAG_CORPUS_BUCKET = "guess-figure-turtle-corpus"
RAG_VECTOR_DIMENSIONS = "1024"
RAG_VECTOR_METRIC = "cosine"

# 注意: 以下两个是密钥值, 不入 git；当前项目 Wrangler 3.114.17 尚不支持 [secrets] 声明，
# 真实值必须通过 `wrangler pages secret put` 写入 Cloudflare:
#   - YUNWU_API_KEY        云雾 API Key (001 使用; 若 dashboard 现已配且仍生效则免再配)
#   - AUTH_HMAC_SECRET     cookie HMAC 签名密钥 (002 新增, SPEC C4)
#   pnpm exec wrangler pages secret put YUNWU_API_KEY --project-name guess-figure
#   pnpm exec wrangler pages secret put AUTH_HMAC_SECRET --project-name guess-figure

# ====================================================================
# D1 — users + games 表 (T1)
# ====================================================================
[[d1_databases]]
binding         = "GF_DB"
database_name   = "guess-figure-db"
database_id     = "076b1fb2-a238-4190-8d61-3c5010af2c5b"
migrations_dir  = "migrations"

# ====================================================================
# KV — 限流计数器 (T2)
# TTL 26h 自动过期 (跨 UTC 0:00 留 buffer)
# ====================================================================
[[kv_namespaces]]
binding = "GF_RATELIMIT"
id      = "797aa9b778dd4a69a970e6befb4ae6b1"

# ====================================================================
# KV — LLM 结果缓存 (T2)
# TTL 30 天 (SPEC G3)
# ====================================================================
[[kv_namespaces]]
binding = "GF_LLM_CACHE"
id      = "c7d92348d3ea4c1aae42d2804c7e13e4"

# ====================================================================
# Vectorize — 004 海龟汤 RAG 向量索引
# index: guess-figure-turtle-rag, V2, 1024 维, cosine
# ====================================================================
[[vectorize]]
binding = "GF_VECTORIZE"
index_name = "guess-figure-turtle-rag"

# ====================================================================
# R2 — 004 海龟汤 RAG 语料主存储
# 存放原始/清洗语料、chunk JSONL、构建报告；D1 只存 manifest。
# ====================================================================
[[r2_buckets]]
binding = "GF_CORPUS_R2"
bucket_name = "guess-figure-turtle-corpus"

# ====================================================================
# Workers AI — 004 embedding / rerank / RAG 判定调用
# ====================================================================
[ai]
binding = "AI"
